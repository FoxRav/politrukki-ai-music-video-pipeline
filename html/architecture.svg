<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1110" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="800" height="1110" fill="#0d1117"/>

  <text x="400" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#c9d1d9">Architecture Overview</text>
  <text x="400" y="72" text-anchor="middle" font-size="13" fill="#7d8590">AI-native production workflow  ·  orchestrated in Cursor  ·  9 stages  ·  1 song  ·  24 clips</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- 0: Cursor (orchestration layer, highlighted purple) -->
  <g transform="translate(140 100)">
    <rect width="520" height="68" rx="12" fill="#8957e5" stroke="#a371f7" stroke-width="2"/>
    <text x="260" y="30" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">Cursor</text>
    <text x="260" y="52" text-anchor="middle" font-size="11" fill="#ece8ff">workflow orchestration layer  ·  every stage runs through one workspace</text>
  </g>
  <line x1="400" y1="168" x2="400" y2="198" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 1: Claude / ChatGPT (tool) -->
  <g transform="translate(160 203)">
    <rect width="480" height="60" rx="10" fill="#1f6feb" stroke="#388bfd" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Claude  ·  ChatGPT</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#dde4ee">ideation  ·  scriptwriting  ·  prompts  ·  reference images</text>
  </g>
  <line x1="400" y1="263" x2="400" y2="293" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2: Lyrics & Storyboard (output) -->
  <g transform="translate(160 298)">
    <rect width="480" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#c9d1d9">Lyrics  &amp;  Storyboard</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#7d8590">02_lyriikat  ·  04_storyboard</text>
  </g>
  <line x1="400" y1="358" x2="400" y2="388" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3: ElevenLabs Music (tool) -->
  <g transform="translate(160 393)">
    <rect width="480" height="60" rx="10" fill="#1f6feb" stroke="#388bfd" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">ElevenLabs Music</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#dde4ee">song generation from composition plan</text>
  </g>
  <line x1="400" y1="453" x2="400" y2="483" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4: Audio (output) -->
  <g transform="translate(160 488)">
    <rect width="480" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#c9d1d9">Audio  master</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#7d8590">3 min 55 s  ·  85 BPM  ·  D minor  ·  roots reggae</text>
  </g>
  <line x1="400" y1="548" x2="400" y2="578" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5: FocalML Seedance (tool) -->
  <g transform="translate(160 583)">
    <rect width="480" height="60" rx="10" fill="#1f6feb" stroke="#388bfd" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">FocalML Seedance 2.0</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#dde4ee">image-to-video generation with native audio</text>
  </g>
  <line x1="400" y1="643" x2="400" y2="673" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="663" font-size="10" fill="#7d8590" font-style="italic">? FFmpeg (DNxHR / ProRes)</text>

  <!-- 6: Video (output) -->
  <g transform="translate(160 678)">
    <rect width="480" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#c9d1d9">Video clips</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#7d8590">24 clips  ·  7–11 s each  ·  1080p / 4K</text>
  </g>
  <line x1="400" y1="738" x2="400" y2="768" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7: OpenVINO / Demucs (tool) -->
  <g transform="translate(160 773)">
    <rect width="480" height="60" rx="10" fill="#1f6feb" stroke="#388bfd" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">OpenVINO  ·  Demucs v4</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#dde4ee">stem separation locally (vocals · drums · bass · other)</text>
  </g>
  <line x1="400" y1="833" x2="400" y2="863" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8: DaVinci Resolve (highlighted) -->
  <g transform="translate(140 868)">
    <rect width="520" height="72" rx="12" fill="#238636" stroke="#2ea043" stroke-width="2"/>
    <text x="260" y="30" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">DaVinci Resolve</text>
    <text x="260" y="52" text-anchor="middle" font-size="11" fill="#dffadb">edit  ·  multi-stem mix  ·  color  ·  master  ·  multi-format deliver</text>
  </g>
  <line x1="400" y1="940" x2="400" y2="970" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 9: Publishing (output, special color) -->
  <g transform="translate(160 975)">
    <rect width="480" height="60" rx="10" fill="#d29922" stroke="#e6b042" stroke-width="1"/>
    <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Publishing</text>
    <text x="240" y="48" text-anchor="middle" font-size="11" fill="#1a1a1a">YouTube  ·  TikTok  ·  Reels  ·  Shorts  ·  Kick</text>
  </g>

  <!-- footer / legend -->
  <g transform="translate(90 1070)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#8957e5"/>
    <text x="22" y="11" font-size="11" fill="#7d8590">Orchestration (Cursor)</text>
    <rect x="170" y="0" width="14" height="14" rx="3" fill="#1f6feb"/>
    <text x="192" y="11" font-size="11" fill="#7d8590">AI tool</text>
    <rect x="250" y="0" width="14" height="14" rx="3" fill="#161b22" stroke="#30363d"/>
    <text x="272" y="11" font-size="11" fill="#7d8590">Output</text>
    <rect x="330" y="0" width="14" height="14" rx="3" fill="#238636"/>
    <text x="352" y="11" font-size="11" fill="#7d8590">Assembler (Resolve)</text>
    <rect x="500" y="0" width="14" height="14" rx="3" fill="#d29922"/>
    <text x="522" y="11" font-size="11" fill="#7d8590">Distribution</text>
  </g>
</svg>
